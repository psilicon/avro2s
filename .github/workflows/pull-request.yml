name: Pull Request
on:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup SBT
      uses: coursier/setup-action@v2
      with:
        jvm: temurin:21
        apps: sbt
    - name: Build and Test
      run: sbt -v +test
